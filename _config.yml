# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title
plugins: [jekyll-sitemap, jekyll-feed, jekyll-seo-tag]

sass:
  sass_dir: assets/css
  style: :compressed

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title: "BitDevs Torino"
description: "BitDevs Torino is a meetup and developer-community for students, developers, and researchers in Turin who are interested in the research and development of Bitcoin and related protocols."
url: "https://bitdevstorino.org"
baseurl: ""

# Leave out some files
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', '.sass-cache']

future: true

